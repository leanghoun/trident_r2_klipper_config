#####################################################################
#	Macros
#####################################################################

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True
variable_custom_park_x    : 147
variable_custom_park_y    : 10
variable_custom_park_dz   : 10
variable_retract          : 1.0
variable_cancel_retract   : 5.0
variable_speed_retract    : 35.0
variable_unretract        : 1.0
variable_speed_unretract  : 35.0
variable_speed_hop        : 15.0
variable_speed_move       : 100.0
variable_park_at_cancel   : False
variable_use_fw_retract   : False
variable_idle_timeout     : 0
variable_runout_sensor    : ""
gcode:

[gcode_macro BETTER_PRINT_START]
# Generated by "A better print_start macro wizard"
# Generated on: 2026-07-03 05:53:21
# Configuration:
#   - Printer: Voron Trident
#   - Probe: Cartographer (Scan mode)
#   - Slicer: PrusaSlicer
#   - Default chamber temp: 45°C
#   - Hotend as chamber thermistor
#   - VOC filtration
#   - Status text
#   - Purge line
#   - Bed mesh

# PrusaSlicer start G-code (backup reference):
#   M104 S0 ; Cancel slicer-injected heating so PRINT_START controls it
#   M140 S0 ; Cancel slicer-injected heating so PRINT_START controls it
#   BETTER_PRINT_START EXTRUDER=[first_layer_temperature[initial_extruder]] BED=[first_layer_bed_temperature] CHAMBER=[chamber_temperature] CHAMBER_MINIMAL=[chamber_minimal_temperature]

gcode:
  # ---------- Read parameters passed in from the slicer ----------
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("45")|int %}
  {% set target_chamber_minimal = params.CHAMBER_MINIMAL|default("0")|int %}
  {% set target_chamber_wait = [target_chamber, target_chamber_minimal]|select(">", 0)|min|default(0) %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

  # ---------- Clear any previous pause state and home all axes ----------
  CLEAR_PAUSE
  G28
  G90

  # ---------- Clear old bed mesh so a fresh one can be generated later ----------
  BED_MESH_CLEAR

  # ---------- Heat the bed (and soak chamber for higher-temp prints) ----------
  {% if params.BED|int > 90 %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
    M106 S255
    SET_PIN PIN=filter VALUE=1
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M190 S{target_bed}
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber_wait}c"

    # ---------- Chamber heat soak (using hotend thermistor) ----------
    # Hotend is left OFF so its thermistor reads ambient / radiated heat.
    # Park the nozzle close to the bed so it heat soaks faster.
    M104 S0
    G1 X{x_wait} Y{y_wait} Z5 F9000
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target_chamber_wait}

  {% else %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M190 S{target_bed}
    SET_DISPLAY_TEXT MSG="Soak for 5 min"
    G4 P300000
  {% endif %}

  # ---------- Pre-heat hotend to a probe-safe temperature ----------
  SET_DISPLAY_TEXT MSG="Hotend: 150c"
  M109 S150

  # ---------- Level the bed relative to the gantry, then re-home Z ----------
  SET_DISPLAY_TEXT MSG="Leveling"
  Z_TILT_ADJUST
  G28 Z

  # ---------- Generate a fresh bed mesh at print temperatures ----------
  SET_DISPLAY_TEXT MSG="Bed mesh"
  BED_MESH_CALIBRATE

  # ---------- Heat hotend to print temperature ----------
  SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"
  G1 X{x_wait} Y{y_wait} Z15 F9000
  M107
  M109 S{target_extruder}

  # ---------- Purge / prime line, then hand off to the print ----------
  SET_DISPLAY_TEXT MSG="Printer goes brr"
  G0 X{x_wait - 50} Y4 F10000
  G0 Z0.4
  G91
  G1 X100 E20 F1000
  G90
	
[gcode_macro PRINT_START]
gcode:
    {% set BED = params.BED|default(110)|int %}
    {% set HOTEND = params.HOTEND|default(255)|int %}
    {% set MODE = params.MODE|default("normal")|lower %}
    {% set BED_TOLERANCE = 1.0 %}

	SKEW_PROFILE LOAD=Califlower
    CLEAR_PAUSE

    {% if MODE == "continue" and "xyz" not in printer.toolhead.homed_axes %}
        {action_raise_error("PRINT_START MODE=continue requires printer to already be homed.")}
    {% endif %}

    M117 Heating bed...
    {% if printer.heater_bed.temperature < (BED - BED_TOLERANCE) %}
        M190 S{BED}
    {% else %}
        M140 S{BED}
    {% endif %}

    M117 Pre-heating hotend...
    M104 S180

    {% if MODE != "continue" %}
        {% if "xyz" not in printer.toolhead.homed_axes %}
            M117 Homing XYZ...
            SET_GCODE_OFFSET Z=0
            G28
        {% else %}
            M117 Updating Z...
            G28 Z
        {% endif %}

        G90
        M117 Leveling...
        Z_TILT_ADJUST
        M117 Updating Z...
        G28 Z
        M117 Clearing mesh...
        BED_MESH_CLEAR
        M117 Calibrating mesh...
        BED_MESH_CALIBRATE
    {% else %}
        M117 Continue mode
        G90
    {% endif %}

    G92 E0

    {% if MODE != "continue" %}
        G0 X5 Y3 F6000
    {% endif %}

    M117 Heating hotend...
    M109 S{HOTEND}

    {% if MODE != "continue" %}
        PURGE
    {% else %}
        M117 Continue - purge manually if needed
    {% endif %}

    M117

[gcode_macro PURGE]
description: Normal bed-front purge line
gcode:
    M117 Purging...

    G90
    G0 Z0.4
    M83
    G92 E0

    ; Recover from the -18 mm FORM_TIP retract
    G1 E15 F1800              ; Quickly advance through the cold filament path
    G1 E3 F300                ; Slowly refill the melt zone
    G4 P250                   ; Allow nozzle pressure to stabilize

    ; Draw purge line
    G91
    G1 X100 E25 F1200
    G1 Z6 F3000

    G90
    G92 E0
    G1 F9000

[gcode_macro PRINT_INTERMISSION]
description: End current file but preserve alignment for follow-up color file
gcode:
	SET_SKEW CLEAR=1

    M117 Intermission
    M400
    G91
    G0 Z5 F3600
    G90
    G0 X147 Y10 F6000
    G92 E0
    FORM_TIP
    M104 S150
    M106 S0
    M117 Ready for filament swap

[gcode_macro PRINT_END]
gcode:
	SET_SKEW CLEAR=1

    M117 Print complete

    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    {% if printer.toolhead.position.z < (max_z - 5) %}
        {% set z_safe = 5.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    M400

    G91
    G0 Z{z_safe} F3600
    G90
    G0 X{max_x / 2} Y295 F6000

    G92 E0
    FORM_TIP

    M104 S0
    M140 S0
    M106 S0

[gcode_macro FORM_TIP]
description: Helper: Form pointed filament tip and reduce nozzle ooze
gcode:
    G92 E0
    M83

    ; Shape the filament tip
    G1 E2 F100
    G1 E-2 F900
    G1 E4 F100

    ; Fast pressure break
    G1 E-3 F2400

    ; Short pause lets pressure equalize after the break
    G4 P250

    ; Controlled final retract for cold swap / gear position
    G1 E-15 F1800

    G92 E0
    
[gcode_macro CENTER]
gcode:
	G90                       ; absolute positioning
	G0 Z6 F3600               ; move bed down
	G0 X147 Y151 F8000


[gcode_macro FRONT]
gcode:
	G90                       ; absolute positioning
	G0 Z6 F3600               ; move bed down
	G0 X147 Y10 F8000


[gcode_macro REAR]
gcode:
	G90                       ; absolute positioning
	G0 Z6 F3600               ; move bed down
	G0 X147 Y295 F8000


[gcode_macro BELT]
description: A macro that assists with repeatable belt tensioning.
variable_y_tensioning_position: 118  # Position the printhead needs to be to have 150mm of belt length exposed for belt tensioning.
gcode:
	{% set x_max = printer.configfile.settings.stepper_x.position_max %}
	{% set travel_speed = printer.configfile.settings.printer.max_velocity %}

	G90                        ; absolute positioning
	G0 X147 Y{y_tensioning_position} F8000

[gcode_macro MOTORS_OFF]
gcode:
	M18
    
[gcode_macro HEATSOAK_ABS]
gcode:
    M117 Heatsoaking ABS...
    {action_respond_info("Heating bed to 110")}
    M140 S110
	#SET_FAN_SPEED FAN=bed_fans SPEED=0.7

[gcode_macro HEATSOAK_PLA]
gcode:
    M117 Heatsoaking PLA...
    {action_respond_info("Heating bed to 60")}
    M140 S60
	
[gcode_macro HEATSOAK_HOTEND]
gcode:
	M104 S175

[gcode_macro COOLDOWN]
gcode:
    M117
    {action_respond_info("Cooling down")}
    TURN_OFF_HEATERS 
	#SET_FAN_SPEED FAN=bed_fans SPEED=0  # turn off bed fans

[gcode_macro PREPARE_MACHINE]
description: Home and Z-tilt if needed
gcode:
    M117 Preparing machine...

    {% if "xyz" not in printer.toolhead.homed_axes %}
        SET_GCODE_OFFSET Z=0
        G28
    {% endif %}

    Z_TILT_ADJUST
    G28 Z

    M117 Machine ready

[gcode_macro LOAD_AND_PURGE]
description: Heat to filament temp, purge old filament, then form tip for next print
gcode:
    ; LOAD_AND_PURGE, defaults to ABS
    ; LOAD_AND_PURGE TEMP=210, to set a specific filament temperature
    ; LOAD_AND_PURGE TEMP=250 PURGE=100, to set a specific filament temperature and purge amount

    {% set TEMP = params.TEMP|default(250)|int %}
    {% set PURGE_AMOUNT = params.PURGE|default(100)|int %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        M117 Homing...
        G28
    {% endif %}

    M117 Moving to front...
    G90
    G0 Z20 F3600
    G0 X147 Y10 F6000

    M117 Heating hotend...
    M109 S{TEMP}

    M117 Purging filament...
    M83
    G92 E0
    G1 E{PURGE_AMOUNT} F180
    G4 P500

    M117 Forming tip...
    FORM_TIP

    M104 S0
    M107

    M117 Ready to print

[gcode_macro NOZZLE_SCRUB]
description: Scrub nozzle with cleaning filament, then cool for cold pull
gcode:
    {% set SCRUB_TEMP = params.SCRUB_TEMP|default(250)|int %}
    {% set COOL_TEMP  = params.COOL_TEMP|default(80)|int %}

    M117 Nozzle Scrub

    # Raise nozzle if homed
    {% if "z" in printer.toolhead.homed_axes %}
        G91
        G1 Z10 F1200
        G90
    {% endif %}

    # Heat nozzle
    M109 S{SCRUB_TEMP}

    # Relative extrusion
    G92 E0
    M83

    # Prime cleaning filament
    G1 E8 F120

    # Scrub the melt zone
    {% for i in range(20) %}
        G1 E1.5 F300
        G1 E-0.8 F600
    {% endfor %}

    # Final purge
    G1 E8 F120
    G92 E0

    # Cool for cold pull
    M117 Cooling...
    M104 S{COOL_TEMP}

    {action_respond_info("Wait until the nozzle reaches the target temperature, then slowly pull the cleaning filament straight out.")}

    M117 Ready for Cold Pull

#####################################################################
#   Skirt Buttons
#####################################################################

[gcode_button BUTTON_HEATSOAK]
pin: ^!PB14
press_gcode:
  	{% if printer.heater_bed.target == 110 %}
      COOLDOWN
	{% elif printer.heater_bed.target == 60 %}
      HEATSOAK_ABS
	{% else %}
      HEATSOAK_PLA
	{% endif %}
release_gcode:

[gcode_button BUTTON_PLAYPAUSE]
pin: ^!PB13
press_gcode:
    {% if printer.pause_resume.is_paused %}
            RESUME
        {% elif printer.print_stats.state == "printing" %}
            PAUSE
        {% else %}
            PREPARE_MACHINE
        {% endif %}
release_gcode:

[gcode_button BUTTON_MICROSTEP_UP]
pin: ^!PC2
press_gcode:
    {action_respond_info("Microstepping up")}
    SET_GCODE_OFFSET Z_ADJUST=0.01         
release_gcode:

[gcode_button BUTTON_MICROSTEP_DOWN]
pin: ^!PC1
press_gcode:
    {action_respond_info("Microstepping down")}
    SET_GCODE_OFFSET Z_ADJUST=-0.01
release_gcode: