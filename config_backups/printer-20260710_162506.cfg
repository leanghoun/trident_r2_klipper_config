# Max X: 295
# Max Y: 305
# Max Z: 243

[include mainsail.cfg]
[include led-effects.cfg]
[include macros.cfg]
[include config_backup.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_130038001450325635393320-if00
restart_method: command

[mcu ebb]
canbus_uuid: 22d94ecc402e

[mcu cartographer]
canbus_uuid: 86a80820b843

[virtual_sdcard]
path: /home/leang/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy
max_velocity: 400
max_accel: 4000
max_z_velocity: 15
max_z_accel: 50
square_corner_velocity: 5.0

#####################################################################
#   X/Y Stepper Settings
#####################################################################

[stepper_x]
##  Connected to X-MOT (B Motor)
##  B Stepper - Left
##  Endstop connected to X-
step_pin: PD8
dir_pin: !PB12
enable_pin: !PD9
rotation_distance: 40
microsteps: 32  # 16 default
full_steps_per_rotation:200
endstop_pin: ^ebb:PB8
position_min: 0
position_endstop: 295  # -5 to prevent crashing
position_max: 295 # -5 to prevent triggering X limit switch
homing_speed: 35  # Max 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PE15
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_y]
##  Connected to Y-MOT (A Motor)
##  A Stepper - Right
##  Endstop connected to Y-
step_pin: PE11
dir_pin: PE10
enable_pin: !PE9
rotation_distance: 40
microsteps: 32  # 16 default
full_steps_per_rotation:200
endstop_pin: ^PA2
position_min: 0
position_endstop: 305
position_max: 305
homing_speed: 35
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PE7
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Z Stepper Settings
#####################################################################

##  Z0 Stepper - Left Z Motor
##  Connected to E1-MOT
##  Endstop connected to Z-
[stepper_z]
step_pin: PE6
dir_pin: PC13
enable_pin: !PE5
rotation_distance: 4  # Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
microsteps: 128  # 16 default
full_steps_per_rotation: 200  #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: probe:z_virtual_endstop
position_max: 243
position_min: -2.5
homing_speed: 6.0 # Leadscrews are slower than 2.4, 10 is a recommended max.
second_homing_speed: 3
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PC14
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z1 Stepper - Rear Z Motor
##  Connected to E2-MOT
[stepper_z1]
step_pin: PE2
dir_pin: PE4
enable_pin: !PE3
rotation_distance: 4  # Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
microsteps: 128  # 16 default
full_steps_per_rotation: 200  #200 for 1.8 degree, 400 for 0.9 degree

[tmc2209 stepper_z1]
uart_pin: PC15
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z2 Stepper - Right Rear Z Motor
##  Connected to E3-MOT
[stepper_z2]
step_pin: PD12
dir_pin: PC4
enable_pin: !PE8
rotation_distance: 4  # Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
microsteps: 128  # 16 default
full_steps_per_rotation: 200  #200 for 1.8 degree, 400 for 0.9 degree

[tmc2209 stepper_z2]
uart_pin: PA15
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Extruder
#####################################################################

##  In E0-MOT Position
[extruder]
step_pin: ebb:PD0
dir_pin: ebb:PD1
enable_pin: !ebb:PD2

##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point
rotation_distance: 47.747  # 47.088 per WWG2 manual
##  Update Gear Ratio depending on your Extruder Type
##  Use 50:17 for Afterburner/Clockwork1 (BMG Gear Ratio)
##  Use 50:10 for Stealthburner/Clockwork2 (BMG Gear Ratio)
##  Use 80:20 for M4, M3.1
gear_ratio: 9:1  # 9:1 per WWG2 manual	
microsteps: 16
full_steps_per_rotation: 200 # 200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
##  In E0 OUT Position
heater_pin: ebb:PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: ebb:PA3
min_temp: 10
max_temp: 270
max_power: 1.0
min_extrude_temp: 10  # 170 default, 10 only to calibrate e-steps
max_extrude_only_distance: 100
max_extrude_cross_section: 5.5  # For adaptive purge
pressure_advance: 0.034  # Default 0.03, try to keep pressure_advance below 1.0
pressure_advance_smooth_time: 0.030  # Default is 0.040, Ellis uses 0.020

[tmc2209 extruder]
uart_pin: ebb:PA15 #PD7
interpolate: false
run_current: 0.6  # 0.6 per WWG2 manual	
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Bed Heater
##################################################################### 

[heater_bed]
##  SSR Pin - In BED OUT position
heater_pin: PB4
sensor_type: Generic 3950
sensor_pin: PC3 # TB Position
##  Adjust Max Power so your heater doesn't warp your bed
max_power: 0.85
min_temp: 0
max_temp: 120
control: watermark
max_delta: 0.5

[idle_timeout]
timeout: 3600
gcode:
	M104 S0  # turn off hotend
	M140 S0  # turn off bed
	M106 S0  # turn off fan

#####################################################################
#   Cartographer
#####################################################################

[cartographer]
mcu: cartographer
x_offset: 0  # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 24  # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: no  # For extra output

[safe_z_home]
home_xy_position: 147, 151  # This should be the center of your bed.
speed:300  #100
z_hop:6

[z_tilt]
z_positions:
	-46, 20
	150, 338
	346, 20
points:
	10, 10
	147, 256
	285, 10
speed: 400
horizontal_move_z: 6
retries: 5
retry_tolerance: 0.0075

[bed_mesh]
zero_reference_position: 147, 151  # The centre of your bed. 
speed: 300
horizontal_move_z: 3
mesh_min: 15, 25  # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 280, 280  # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0,0  # Disable interpolation - mesh is probably dense enough

#[temperature_sensor cartographer]
#sensor_type: temperature_mcu
#sensor_mcu: cartographer
#min_temp: 5
#max_temp: 105

[adxl345]
cs_pin: cartographer:PA3
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
	147, 151, 20  # Fill out the blank with x and y coordinates where you want to run the resonance test.

#####################################################################
#   Fan Control
#####################################################################

[heater_fan hotend_fan]
##  Hotend Fan
pin: ebb:PA0
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 70.0
fan_speed: 1.0

[fan]
##  Print Cooling Fan
pin: ebb:PA1
max_power: 1.0
kick_start_time: 0.5
##  Depending on your fan, you may need to increase this value
##  if your fan will not start. Can change cycle_time (increase)
##  if your fan is not able to slow down effectively

[heater_fan controller_fan]
##  Controller fan
pin: PB2
kick_start_time: 0.5
heater: heater_bed
heater_temp: 70.0

[fan_generic exhaust_fan]
##  Exhaust fan
pin: PA14
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0 

[delayed_gcode CHAMBER_FAN_CONTROL]
initial_duration: 5
gcode:
    {% set bed_temp = printer.heater_bed.temperature|float %}
    {% set fan_speed = printer["fan_generic exhaust_fan"].speed|float %}

    {% if bed_temp >= 85 and fan_speed == 0 %}
        SET_FAN_SPEED FAN=exhaust_fan SPEED=1.0
    {% elif bed_temp <= 65 and fan_speed > 0 %}
        SET_FAN_SPEED FAN=exhaust_fan SPEED=0.0
    {% endif %}

    UPDATE_DELAYED_GCODE ID=CHAMBER_FAN_CONTROL DURATION=5

####################################################################
#	Displays
#####################################################################

[display]
#  mini12864 LCD Display
lcd_type: uc1701
cs_pin: PC11
a0_pin: PD2
rst_pin: PC10
encoder_pins: ^PC6,^PC7
click_pin: ^!PA8
contrast: 63
#spi_bus: spi1
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
spi_software_sclk_pin: PA5

####################################################################
#	Extras
#####################################################################

[gcode_arcs]
resolution: 1.0

[skew_correction]

[shaketune]
# result_folder: ~/printer_data/config/ShakeTune_results
#    Path where the processed results will be stored. If the folder doesn't exist,
#    it will be automatically created. You can change this if you'd like to store 
#    results in a different location.
# number_of_results_to_keep: 10
#    This setting defines how many results you want to keep in the result folder.
#    Once the specified number is exceeded, older results will be automatically deleted
#    to free up space on the SD card and avoid cluttering the results folder.
# keep_raw_data: False
#    If set to True, Shake&Tune will store both the processed graphs and the raw accelerometer
#    .stdata files in the results folder. This can be useful for debugging or archiving purposes.
#    Please always attach them when reporting any issues on GitHub or Discord.
# show_macros_in_webui: True
#    Mainsail and Fluidd doesn't create buttons for system commands (macros that are not part
#    of the printer.cfg file). This option allow Shake&Tune to inject them into the webui at runtime.
#    If set to False, the macros will be hidden but still accessible from the console by typing
#    their names manually, which can be useful if you prefer to encapsulate them into your own macros.
# timeout: 600
#    This defines the maximum processing time (in seconds) to allows to Shake&Tune for generating 
#    graphs from a .stdata file. 10 minutes should be more than enough in most cases, but if you have
#    slower hardware (e.g., older SD cards or low-performance devices), increase it to prevent timeouts.
# measurements_chunk_size: 2
#    Each Shake&Tune command uses the accelerometer to take multiple measurements. By default,
#    Shake&Tune will write a chunk of data to disk every two measurements, and at the end of the
#    command will merge these chunks into the final .stdata file for processing. "2" is a very
#    conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little
#    RAM, and should work for everyone. However, if you are using a powerful computer, you may
#    wish to increase this value to keep more measurements in memory (e.g., 15-20) before writing
#    the chunk and avoid stressing the filesystem too much.
# max_freq: 200
#    This setting defines the maximum frequency at which the calculation of the power spectral density
#    is cutoff. The default value should be fine for most machines and accelerometer combinations and
#    avoid touching it unless you know what you're doing.
# dpi: 300
#    Controls the resolution of the generated graphs. The default value of 300 dpi was optimized
#    and strikes a balance between performance and readability, ensuring that graphs are clear
#    without using too much RAM to generate them. Usually, you shouldn't need to change this value.


