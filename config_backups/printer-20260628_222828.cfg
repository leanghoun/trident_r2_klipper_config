[include mainsail.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_130038001450325635393320-if00
restart_method: command

[mcu ebb]
canbus_uuid: 22d94ecc402e

[mcu cartographer]
canbus_uuid: 86a80820b843

[virtual_sdcard]
path: /home/leang/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy
max_velocity: 400
max_accel: 4000
max_z_velocity: 15
max_z_accel: 50
square_corner_velocity: 5.0

#####################################################################
#   X/Y Stepper Settings
#####################################################################

[stepper_x]
##  Connected to X-MOT (B Motor)
##  B Stepper - Left
##  Endstop connected to X-
step_pin: PD8
dir_pin: !PB12
enable_pin: !PD9
rotation_distance: 40
microsteps: 32  # 16 default
full_steps_per_rotation:200
endstop_pin: ^ebb:PB8
position_min: 0
position_endstop: 300
position_max: 300
homing_speed: 35  # Max 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PE15
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_y]
##  Connected to Y-MOT (A Motor)
##  A Stepper - Right
##  Endstop connected to Y-
step_pin: PE11
dir_pin: PE10
enable_pin: !PE9
rotation_distance: 40
microsteps: 32  # 16 default
full_steps_per_rotation:200
endstop_pin: ^PA2
position_min: 0
position_endstop: 300
position_max: 300
homing_speed: 35
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PE7
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Z Stepper Settings
#####################################################################

##  Z0 Stepper - Left Z Motor
##  Connected to E1-MOT
##  Endstop connected to Z-
[stepper_z]
step_pin: PE6
dir_pin: PC13
enable_pin: !PE5
rotation_distance: 4  # Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
microsteps: 128  # 16 default
full_steps_per_rotation: 200  #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -2.5
homing_speed: 6.0 # Leadscrews are slower than 2.4, 10 is a recommended max.
second_homing_speed: 3
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PC14
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z1 Stepper - Rear Z Motor
##  Connected to E2-MOT
[stepper_z1]
step_pin: PE2
dir_pin: PE4
enable_pin: !PE3
rotation_distance: 4  # Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
microsteps: 128  # 16 default
full_steps_per_rotation: 200  #200 for 1.8 degree, 400 for 0.9 degree

[tmc2209 stepper_z1]
uart_pin: PC15
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z2 Stepper - Right Rear Z Motor
##  Connected to E3-MOT
[stepper_z2]
step_pin: PD12
dir_pin: PC4
enable_pin: !PE8
rotation_distance: 4  # Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
microsteps: 128  # 16 default
full_steps_per_rotation: 200  #200 for 1.8 degree, 400 for 0.9 degree

[tmc2209 stepper_z2]
uart_pin: PA15
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Extruder
#####################################################################

##  In E0-MOT Position
[extruder]
step_pin: ebb:PD0
dir_pin: ebb:PD1
enable_pin: !ebb:PD2

##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point
rotation_distance: 47.088  # 47.088 per WWG2 manual
##  Update Gear Ratio depending on your Extruder Type
##  Use 50:17 for Afterburner/Clockwork1 (BMG Gear Ratio)
##  Use 50:10 for Stealthburner/Clockwork2 (BMG Gear Ratio)
##  Use 80:20 for M4, M3.1
gear_ratio: 9:1  # 9:1 per WWG2 manual	
microsteps: 16
full_steps_per_rotation: 400 # 200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
##  In E0 OUT Position
heater_pin: ebb:PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: ebb:PA3
min_temp: 10
max_temp: 270
max_power: 1.0
min_extrude_temp: 10  # 170 default, 10 only to calibrate e-steps
max_extrude_only_distance: 100
max_extrude_cross_section: 5.5  # For adaptive purge
pressure_advance: 0.033  # Default 0.03, try to keep pressure_advance below 1.0
pressure_advance_smooth_time: 0.030  # Default is 0.040, Ellis uses 0.020

[tmc2209 extruder]
uart_pin: ebb:PA15 #PD7
interpolate: false
run_current: 0.6  # 0.6 per WWG2 manual	
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Bed Heater
##################################################################### 

[heater_bed]
##  SSR Pin - In BED OUT position
heater_pin: PB4
sensor_type: Generic 3950
sensor_pin: PC3 # TB Position
##  Adjust Max Power so your heater doesn't warp your bed
max_power: 1
min_temp: 0
max_temp: 120

[idle_timeout]
timeout: 3600
gcode:
	M104 S0  # turn off hotend
	M140 S0  # turn off bed
	M106 S0  # turn off fan

#####################################################################
#   Cartographer
#####################################################################

[cartographer]
mcu: cartographer
x_offset: 0  # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 24  # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: no  # For extra output

[safe_z_home]
home_xy_position: 150, 150  # This should be the center of your bed.

[z_tilt]
z_positions:
	-46, 20
	150, 338
	346, 20
points:
	10, 10
	150, 290
	290, 10
speed: 400
horizontal_move_z: 6
retries: 5
retry_tolerance: 0.0075

[bed_mesh]
zero_reference_position: 150, 150  # The centre of your bed. 
speed: 300
horizontal_move_z: 3
mesh_min: 25, 25  # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 275, 275  # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0,0  # Disable interpolation - mesh is probably dense enough

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[adxl345]
cs_pin: cartographer:PA3
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
	150, 150, 20  # Fill out the blank with x and y coordinates where you want to run the resonance test.

#####################################################################
#   Fan Control
#####################################################################

[heater_fan hotend_fan]
##  Hotend Fan
pin: ebb:PA0
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 70.0
fan_speed: 1.0

[fan]
##  Print Cooling Fan
pin: ebb:PA1
max_power: 1.0
kick_start_time: 0.5
##  Depending on your fan, you may need to increase this value
##  if your fan will not start. Can change cycle_time (increase)
##  if your fan is not able to slow down effectively

[heater_fan controller_fan]
##  Controller fan
pin: PB2
kick_start_time: 0.5
heater: heater_bed
heater_temp: 70.0

[fan_generic exhaust_fan]
##  Exhaust fan
pin: PA14
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0 

####################################################################
#	Displays
#####################################################################

[display]
#  mini12864 LCD Display
lcd_type: uc1701
cs_pin: PC11
a0_pin: PD2
rst_pin: PC10
encoder_pins: ^PC6,^PC7
click_pin: ^!PA8
contrast: 63
#spi_bus: spi1
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
spi_software_sclk_pin: PA5

[neopixel fysetc_mini12864]
#  To control Neopixel RGB in mini12864 display
pin: PC12
chain_count: 3
initial_RED: .19
initial_GREEN: .1
initial_BLUE: .06
color_order: RGB

#####################################################################
#	Macros
#####################################################################
	
[gcode_macro PRINT_START]
gcode:
	{% set BED = params.BED|default(110)|int %}
	{% set HOTEND = params.HOTEND|default(255)|int %}

	SKEW_PROFILE LOAD=Califlower

	M117 Heating bed...
	M190 S{BED}                       ; set final bed temperature and wait for it to be reached
	M117 Pre-heating hotend...
	M104 S180                         ; start preheating hotend to non-ooze temperature prior to homing and mesh
   
	{% if "xyz" not in printer.toolhead.homed_axes %}
	  M117 Homing XYZ...
	  SET_GCODE_OFFSET Z=0            ; Reset Z offset
	  G28                             ; Home all axes
	{% else %}
	  M117 Updating Z...
	  G28 Z
	{% endif %}
	G90                               ; Set to absolute positioning
	M117 Leveling...
	Z_TILT_ADJUST
	M117 Updating Z...
	# CARTOGRAPHER_TOUCH_HOME         ; Precision home with (hot) nozzle
	G28 Z
	M117 Calibrating mesh...     
	BED_MESH_CALIBRATE
	
	#Purge position
	G92 E0
	G0 X5 Y5 F6000                    ; for purge line
	
	M117 Heating hotend...
	M109 S{HOTEND}                    ; set final hotend temperature and wait for it to be reached
	PURGE
	M117 

[gcode_macro PURGE]
description: Normal bed-front purge line
gcode:
	M117 Purging...
	G0 Z0.4
	G91
	G1 X100 E25 F1200
	G1 Z6 F3000                       ; move platform down 6mm
	G92 E0
	G90
	G92 E0                            ; zero the extruded length again
	G1 F9000

[gcode_macro PRINT_END]
gcode:
	M117 Print complete

	#  Get Boundaries
	{% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
	{% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
	{% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

	#  Check end position to determine safe directions to move
	{% if printer.toolhead.position.x < (max_x - 20) %}
		{% set x_safe = 20.0 %}
	{% else %}
		{% set x_safe = -20.0 %}
	{% endif %}

	{% if printer.toolhead.position.y < (max_y - 20) %}
		{% set y_safe = 20.0 %}
	{% else %}
		{% set y_safe = -20.0 %}
	{% endif %}

	{% if printer.toolhead.position.z < (max_z - 2) %}
		{% set z_safe = 2.0 %}
	{% else %}
		{% set z_safe = max_z - printer.toolhead.position.z %}
	{% endif %}

	SET_SKEW CLEAR=1

	#  Commence PRINT_END
	M400                              ; wait for buffer to clear
	G92 E0                            ; zero the extruder
	G91                               ; relative positioning
	G0 Z{z_safe} F3600                ; move nozzle up
	G0 X{x_safe} Y{y_safe} F20000     ; move nozzle to remove stringing
	M104 S0                           ; turn off hotend
	M140 S0                           ; turn off bed
	SET_FAN_SPEED FAN=bed_fans SPEED=0 ; turn off bed fans
	M106 S0                           ; turn off fan
	G90                               ; absolute positioning
	G0 X{max_x / 2} Y166 F3600        ; park nozzle at rear
	FORM_TIP

[gcode_macro FORM_TIP]
description: Helper: Round the filament tip
gcode:
	G92 E0                            ; zero the extruder
	M83                               ; relative extrusion
	G1 E2 F100
	G1 E-2
	G1 E4
	G1 E-11                           ; adjusted to work with the SFS, previous -25 would trip runout

[gcode_macro CENTER]
gcode:
	G90                        ; absolute positioning
	G0 Z15 F3600               ; move bed down
	G0 X85 Y87 F6000           ; X max 169, Y max 173


[gcode_macro FRONT]
gcode:
	G90                        ; absolute positioning
	G0 Z15 F3600               ; move bed down
	G0 X85 Y0 F6000


[gcode_macro REAR]
gcode:
	G90                        ; absolute positioning
	G0 Z15 F3600               ; move bed down
	G0 X85 Y166 F6000


[gcode_macro BELT]
description: A macro that assists with repeatable belt tensioning.
variable_y_tensioning_position: 120       #Position the printhead needs to be to have 150mm of belt length exposed for belt tensioning.
gcode:
	{% set x_max = printer.configfile.settings.stepper_x.position_max %}
	{% set travel_speed = printer.configfile.settings.printer.max_velocity %}

	G90                        ; absolute positioning
	G0 X85 Y{y_tensioning_position} F6000

[gcode_macro MOTORS_OFF]
gcode:
	M18

[gcode_macro HEATSOAK_BED]
gcode:
	M140 S110
	SET_FAN_SPEED FAN=bed_fans SPEED=0.7
	
[gcode_macro HEATSOAK_HOTEND]
gcode:
	M104 S175

[gcode_macro COOLDOWN]
gcode:
	TURN_OFF_HEATERS 
	SET_FAN_SPEED FAN=bed_fans SPEED=0  # turn off bed fans


